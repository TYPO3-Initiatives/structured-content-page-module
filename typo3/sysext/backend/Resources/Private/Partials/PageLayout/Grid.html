<div class="t3-grid-new-content-wizard">
    <a href="#" class="t3js-new-content-wizard-switcher btn btn-default expand ">
        <core:icon identifier="actions-document-add" size="small" /><core:icon identifier="actions-caret-right" size="small" />
    </a>
    <a href="#" class="t3js-new-content-wizard-switcher btn btn-default collapse ">
        <core:icon identifier="actions-caret-left" size="small" /><core:icon identifier="actions-document-add" size="small" />
    </a>
    <div class="t3js-new-content-wizard-bar-container" data-new-content-url="{grid.rows.0.columns.0.newContentUrl}"></div>
</div>

<div class="t3-grid-container">
    <table border="0" cellspacing="0" cellpadding="0" width="100%" class="t3-page-columns t3-grid-table t3js-page-columns">
        <f:for each="{grid.rows}" as="row">
            <tr>
                <f:for each="{row.columns}" as="column">
                    <f:render partial="PageLayout/Grid/Column" arguments="{_all}" />
                </f:for>
            </tr>
        </f:for>
    </table>
</div>
